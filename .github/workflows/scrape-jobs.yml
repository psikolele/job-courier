name: Hourly Job Scraper

on:
  schedule:
    - cron: '0 * * * *' # Ogni ora, al minuto 0
  workflow_dispatch: # Permette avvio manuale

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        working-directory: ./scripts
        run: npm install

      - name: 🕷️ Run Puppeteer Scraper
        working-directory: ./scripts
        run: node scrape.js

      - name: 🚀 Deploy JSON to data branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: data
          force_orphan: false # mantieni history leggera se preferisci, o usa branch root veri
          commit_message: "chore: update latest_jobs.json [skip ci]"
