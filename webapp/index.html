<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO & Localization -->
    <title>JobCourier - Il portale svizzero per il lavoro</title>
    <meta name="description" content="Trova il lavoro dei tuoi sogni in Svizzera o pubblica un annuncio per i migliori talenti su JobCourier." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jobcourier.ch">
    <meta property="og:title" content="JobCourier - Il portale svizzero per il lavoro">
    <meta property="og:description" content="Il portale leader in Svizzera per connettere i migliori talenti con le aziende di successo. Cerca migliaia di offerte di lavoro in tutti i settori.">
    <meta property="og:image" content="/JC_logo2x.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- JSON-LD Structured Data Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "JobCourier",
      "url": "/",
      "description": "Il portale svizzero per il lavoro e il recruiting.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
